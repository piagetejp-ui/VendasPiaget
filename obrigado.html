<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pagamento recebido | Escola Piaget</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,sans-serif;background:linear-gradient(135deg,#2C3896,#18236e);padding:18px;color:#151728}.card{width:min(540px,100%);background:#fff;border-radius:24px;padding:25px;box-shadow:0 20px 50px rgba(0,0,0,.25);text-align:center}h1{color:#2C3896}.status{background:#f3f4fa;padding:14px;border-radius:14px;font-weight:700;margin:14px 0}a{display:inline-block;background:#FF981F;color:#fff;text-decoration:none;padding:12px 16px;border-radius:10px;font-weight:700}</style></head><body><main class="card"><h1>Pagamento recebido</h1><p>A confirmação será aplicada automaticamente à conta ou ao pedido do aluno.</p><div id="status" class="status">Verificando pagamento...</div><a href="index.html?modo=pai">Voltar ao portal</a></main><script>async function run(){const q=new URLSearchParams(location.search),order_nsu=q.get('order_nsu'),transaction_nsu=q.get('transaction_nsu'),slug=q.get('slug');if(!order_nsu){document.getElementById('status').textContent='Pagamento concluído. A confirmação pode levar alguns instantes.';return}try{const r=await fetch('/api/verificar-pagamento',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_nsu,transaction_nsu,slug})}),d=await r.json();document.getElementById('status').textContent=r.ok&&d.paid?'Pagamento confirmado e aplicado com sucesso.':'Pagamento recebido. A confirmação pode levar alguns instantes.'}catch{document.getElementById('status').textContent='Pagamento recebido. A confirmação será processada automaticamente.'}}run()</script></body></html>
