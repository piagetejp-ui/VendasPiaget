<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pagamento recebido | Escola Piaget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--azul:#2C3896;--laranja:#FF981F;--texto:#171820;--muted:#6e7281;--bg:#f6f7fb}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Montserrat,Arial,sans-serif;background:radial-gradient(circle at 85% 5%,rgba(255,152,31,.14),transparent 28%),radial-gradient(circle at 8% 0%,rgba(44,56,150,.12),transparent 28%),var(--bg);padding:20px;color:var(--texto)}
    .card{width:min(560px,100%);background:#fff;border:1px solid rgba(44,56,150,.10);border-radius:26px;padding:30px;box-shadow:0 24px 70px rgba(25,32,86,.12);text-align:center}
    .logo{width:min(300px,72vw);height:auto;display:block;margin:0 auto 18px}
    .eyebrow{color:var(--laranja);font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
    h1{margin:8px 0 8px;color:var(--azul);font-size:clamp(25px,5vw,36px);line-height:1.1}
    p{margin:0;color:var(--muted);line-height:1.6}
    .status{background:#f2f4fb;border:1px solid #e3e7f7;color:var(--azul);padding:15px;border-radius:16px;font-weight:700;margin:20px 0}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:46px;background:var(--laranja);color:#111;text-decoration:none;padding:12px 18px;border-radius:13px;font-weight:800;box-shadow:0 10px 28px rgba(255,152,31,.20)}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="assets/logo-piaget-horizontal.png" alt="Escola Piaget — Construindo o Saber">
    <div class="eyebrow">Pagamento</div>
    <h1>Pagamento recebido</h1>
    <p>A confirmação será aplicada automaticamente à conta ou ao pedido do aluno.</p>
    <div id="status" class="status">Verificando pagamento...</div>
    <a href="index.html?modo=pai">Voltar ao portal</a>
  </main>
  <script>
    async function run(){
      const q=new URLSearchParams(location.search),order_nsu=q.get('order_nsu'),transaction_nsu=q.get('transaction_nsu'),slug=q.get('slug');
      if(!order_nsu){document.getElementById('status').textContent='Pagamento concluído. A confirmação pode levar alguns instantes.';return}
      try{
        const r=await fetch('/api/verificar-pagamento',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_nsu,transaction_nsu,slug})}),d=await r.json();
        document.getElementById('status').textContent=r.ok&&d.paid?'Pagamento confirmado e aplicado com sucesso.':'Pagamento recebido. A confirmação pode levar alguns instantes.'
      }catch{document.getElementById('status').textContent='Pagamento recebido. A confirmação será processada automaticamente.'}
    }
    run();
  </script>
</body>
</html>
